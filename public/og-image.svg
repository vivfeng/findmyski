  <!-- Logo -->
  <text x="80" y="80" font-family="Georgia, serif" font-size="28" font-weight="500" fill="#141412" letter-spacing="2">FINDMYSKI</text>
  <circle cx="248" cy="74" r="4" fill="#b85c6e"/>

  <!-- Season label -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="16" fill="#b85c6e" letter-spacing="4" font-weight="500">2025 / 2026 SEASON</text>

